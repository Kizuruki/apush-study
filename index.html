<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APUSH Study — Heimler + CED</title>
  <link rel="stylesheet" href="src/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app"></div>

  <!-- API Key Modal -->
  <div id="apiKeyModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h2 class="modal-title">🔑 OpenAI API Key Required</h2>
      <p style="color:#4a5568;margin-bottom:16px;font-size:14px;line-height:1.6">
        This app uses Claude to generate AP-quality questions for every topic.
        Your key is stored only in your browser (localStorage) and never sent anywhere except Anthropic's API.
      </p>
      <input type="password" id="apiKeyInput" placeholder="sk-..." class="api-key-input">
      <p style="font-size:12px;color:#718096;margin:8px 0 16px">
        Get your key at <a href="https://platform.openai.com" target="_blank" ...>platform.openai.com</a>
      </p>
      <div style="display:flex;gap:10px">
        <button onclick="saveApiKey()" class="btn btn-primary" style="flex:1">Save & Continue</button>
      </div>
    </div>
  </div>

  <script src="src/app.js" type="module"></script>
</body>
</html>
